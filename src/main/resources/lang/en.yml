# PremiumKits — English language file
# Color codes: & followed by a color code (0-9, a-f, k-o, r)
# Variables: {player}, {kit}, {cooldown}, {cost}, {amount}, {remaining}

prefix: "&8[&6PK&8] "

# ─── General ──────────────────────────────────────────────────────────────
players-only: "&cThis command can only be used by players."
